server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: catalog-route
              uri: lb://catalog-service
              predicates:
                - Path=/api/products/**

            - id: inventory-route
              uri: lb://inventory-service
              predicates:
                - Path=/api/inventory/**

            - id: order-route
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  swagger-ui:
    urls:
      - name: Serviço de Produtos
        url: /api/products/v3/api-docs
      # - name: Serviço de Estoque
      #   url: /api/inventory/v3/api-docs
      # - name: Serviço de Pedidos
      #   url: /api/orders/v3/api-docs